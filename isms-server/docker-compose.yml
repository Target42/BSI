services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: isms
      POSTGRES_PASSWORD: isms
      POSTGRES_DB: isms
    ports:
      - "5432:5432"
    volumes:
      - isms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isms -d isms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  isms_pg_data:
